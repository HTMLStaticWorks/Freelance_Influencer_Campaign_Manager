<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | InfluencerHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
	<link rel="icon" type="image/png" href="assets/images/favicon.png">
</head>
<body class="bg-light">

    <!-- Top Right Toggles -->
    <div class="position-fixed top-0 end-0 p-3 d-flex gap-2" style="z-index: 1050;">
        <div class="rtl-toggle" id="rtlToggle"><small class="fw-bold" style="font-size: 0.65rem;">RTL</small></div>
        <div class="theme-toggle" id="themeToggle">
            <i class="bi bi-moon-fill"></i>
        </div>
    </div>

    <div class="container d-flex flex-column justify-content-center min-vh-100 py-5">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="card p-4 border-0 shadow-sm rounded-4">
                    <div class="text-center mb-4">
                        <a href="index.html" class="navbar-brand fs-3 text-primary d-block">
                            <i class="bi bi-megaphone-fill me-2"></i>InfluencerHub
                        </a>
                    </div>
                    <h3 class="fw-bold mb-3 text-center">Welcome Back</h3>
                    <p class="text-muted small mb-4 text-center">Please enter your details to sign in.</p>
                    
                    <form>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Email Address</label>
                            <input type="email" class="form-control" placeholder="Enter your email">
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Password</label>
                            <div class="input-group">
                                <input type="password" class="form-control" id="password" placeholder="••••••••">
                                <button class="btn btn-outline-secondary border-start-0" type="button" onclick="togglePassword('password', this)">
                                    <i class="bi bi-eye"></i>
                                </button>
                            </div>
                            <div class="text-end mt-1">
                                <a href="#" class="small text-decoration-none">Forgot password?</a>
                            </div>
                        </div>
                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="remember">
                            <label class="form-check-label small" for="remember">Remember me</label>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 mb-3 py-2 fw-bold">Sign In</button>
                    </form>

                    <div class="text-center mb-3">
                        <span class="small text-muted">Or continue with</span>
                    </div>

                    <div class="d-flex gap-2 mb-4">
                        <button class="btn btn-outline-secondary w-100 py-2"><i class="bi bi-google me-2"></i>Google</button>
                        <button class="btn btn-outline-secondary w-100 py-2"><i class="bi bi-github me-2"></i>GitHub</button>
                    </div>

                    <p class="text-center small mb-0">Don't have an account? <a href="register.html" class="fw-bold text-decoration-none">Sign Up</a></p>
                </div>
                <div class="text-center mt-4">
                    <a href="index.html" class="text-muted small text-decoration-none"><i class="bi bi-arrow-left me-1"></i> Back to Home</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
